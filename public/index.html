<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АКИ | Sky Hearts Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --border: rgba(160,120,255,0.13);
  --border2: rgba(160,120,255,0.28);
  --accent: #a078ff;
  --accent2: #e06aff;
  --heart: #ff6b9d;
  --gold: #f0c060;
  --text: #e8e4f0;
  --muted: #7a7490;
  --success: #60e0a0;
  --danger: #ff5050;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
}

/* noise */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px 200px; opacity:0.4;
}

/* ── LAYOUT ── */
.app { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:40px 20px 80px; }

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:28px; border-bottom:1px solid var(--border); margin-bottom:36px;
}
.logo {
  font-family:'Cormorant Garamond',serif;
  font-size:26px; font-weight:300; letter-spacing:0.08em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.logo span { font-weight:600; }
.header-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

/* ── BUTTONS ── */
.btn {
  background:transparent; border:1px solid var(--border);
  color:var(--text); padding:8px 16px; border-radius:6px;
  cursor:pointer; font-family:'DM Mono',monospace; font-size:12px;
  transition:all 0.2s; letter-spacing:0.04em;
}
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn-primary {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; color:#fff; font-weight:500;
}
.btn-primary:hover { opacity:0.85; color:#fff; }
.btn-danger { border-color:rgba(255,80,80,0.3); color:#ff8080; }
.btn-danger:hover { border-color:var(--danger); background:rgba(255,80,80,0.08); }
.btn-ghost { border-color:transparent; color:var(--muted); }
.btn-ghost:hover { color:var(--accent); border-color:var(--border); }
.btn-sm { padding:5px 10px; font-size:11px; }
.btn-xs { padding:3px 8px; font-size:10px; }

/* ── STATS ── */
.info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:36px; }
.info-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:22px; position:relative; overflow:hidden;
}
.info-card::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:80px; height:80px; border-radius:50%;
  background:radial-gradient(circle,rgba(160,120,255,0.12),transparent);
}
.info-card .label { color:var(--muted); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
.info-card .value {
  font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:500; line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.info-card .sub { color:var(--muted); font-size:11px; margin-top:6px; }

/* ── SECTION TITLE ── */
.section-title {
  font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:400;
  letter-spacing:0.06em; margin-bottom:18px; color:var(--text);
  display:flex; align-items:center; gap:10px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── TOOLBAR ── */
.toolbar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
.search-wrap { position:relative; flex:1; min-width:200px; }
.search-wrap input {
  width:100%; background:var(--bg2); border:1px solid var(--border);
  color:var(--text); padding:10px 14px 10px 34px;
  border-radius:8px; font-family:'DM Mono',monospace; font-size:13px;
  outline:none; transition:border-color 0.2s;
}
.search-wrap input:focus { border-color:var(--accent); }
.search-wrap::before { content:'⌕'; position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; }
select {
  background:var(--bg2); border:1px solid var(--border); color:var(--text);
  padding:10px 14px; border-radius:8px; font-family:'DM Mono',monospace;
  font-size:12px; outline:none; cursor:pointer;
}
select:focus { border-color:var(--accent); }

/* ── ORDER CARDS ── */
.orders-grid { display:grid; gap:14px; }
.order-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; overflow:hidden; transition:border-color 0.2s, transform 0.2s;
}
.order-card:hover { border-color:rgba(160,120,255,0.3); transform:translateY(-1px); }
.order-header {
  display:grid; grid-template-columns:1fr auto; align-items:center;
  padding:18px 22px; cursor:pointer; gap:14px;
}
.order-header-left { display:flex; align-items:center; gap:14px; }
.order-nick { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:500; }
.order-code { color:var(--muted); font-size:11px; letter-spacing:0.06em; margin-top:2px; }
.order-meta { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }

.tag {
  background:rgba(160,120,255,0.1); border:1px solid rgba(160,120,255,0.2);
  color:var(--accent); padding:3px 10px; border-radius:20px; font-size:11px;
}
.tag-heart { background:rgba(255,107,157,0.1); border-color:rgba(255,107,157,0.2); color:var(--heart); }
.tag-gold  { background:rgba(240,192,96,0.1);  border-color:rgba(240,192,96,0.2);  color:var(--gold); }
.tag-green { background:rgba(96,224,160,0.1);  border-color:rgba(96,224,160,0.2);  color:var(--success); }

/* ── CIRCLE ── */
.circle-prog { position:relative; width:52px; height:52px; flex-shrink:0; }
.circle-prog svg { transform:rotate(-90deg); }
.circle-bg   { fill:none; stroke:rgba(160,120,255,0.1); stroke-width:4; }
.circle-fill { fill:none; stroke-width:4; stroke-linecap:round; }
.circle-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:var(--accent); }
.chevron { color:var(--muted); transition:transform 0.2s; font-size:16px; flex-shrink:0; }
.order-card.expanded .chevron { transform:rotate(180deg); }

/* ── ORDER BODY ── */
.order-body { display:none; border-top:1px solid var(--border); padding:22px; }
.order-body.open { display:block; }

.notes-block { margin-bottom:18px; }
.notes-label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
.notes-text {
  background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; color:var(--text); font-family:'DM Mono',monospace;
  font-size:12px; line-height:1.6; min-height:54px; width:100%; resize:vertical; outline:none;
  transition:border-color 0.2s;
}
.notes-text:focus { border-color:var(--accent); }
.notes-saved { color:var(--success); font-size:11px; margin-left:8px; opacity:0; transition:opacity 0.3s; }
.notes-saved.show { opacity:1; }

/* ── FRIENDS ── */
.friends-title { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:10px; }
.friends-list  { display:grid; gap:10px; }
.friend-card {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; padding:14px 18px;
  display:grid; grid-template-columns:1fr auto; gap:12px; align-items:start;
}
.friend-nick   { font-size:14px; font-weight:500; margin-bottom:4px; }
.friend-hearts { color:var(--heart); font-size:12px; }
.friend-progress { display:flex; align-items:center; gap:8px; }
.friend-notes  { margin-top:10px; }
.friend-note-text {
  width:100%; background:var(--bg2); border:1px solid var(--border);
  border-radius:6px; padding:7px 10px; color:var(--muted);
  font-family:'DM Mono',monospace; font-size:11px; resize:none;
  outline:none; min-height:38px; transition:border-color 0.2s;
}
.friend-note-text:focus { border-color:var(--accent); color:var(--text); }
.track-link {
  display:inline-flex; align-items:center; gap:5px;
  color:var(--accent); font-size:11px; text-decoration:none;
  border:1px solid rgba(160,120,255,0.2); padding:3px 9px; border-radius:20px; transition:all 0.2s;
}
.track-link:hover { background:rgba(160,120,255,0.1); }
.order-actions { display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; }

/* ── HISTORY PANEL (inside friend card) ── */
.history-panel { margin-top:12px; border-top:1px solid var(--border); padding-top:12px; }
.history-panel-title { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:8px; }
.history-list { display:grid; gap:6px; max-height:200px; overflow-y:auto; padding-right:4px; }
.history-entry {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:7px 11px;
}
.history-entry-left  { display:flex; align-items:center; gap:8px; }
.history-entry-amount { color:var(--heart); font-weight:500; font-size:12px; }
.history-entry-note  { color:var(--muted); font-size:11px; font-style:italic; }
.history-entry-date  { color:var(--muted); font-size:10px; }
.history-add { display:flex; gap:6px; margin-top:8px; }
.history-add input {
  background:var(--bg2); border:1px solid var(--border); border-radius:6px;
  color:var(--text); padding:6px 10px; font-family:'DM Mono',monospace; font-size:12px; outline:none;
  transition:border-color 0.2s;
}
.history-add input:focus { border-color:var(--accent); }
.history-add input[type=number] { width:80px; }
.history-add input[type=text]   { flex:1; }

/* ── MODALS ── */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72);
  z-index:200; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:16px;
  padding:30px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
}
.modal h2 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; margin-bottom:22px; }
.field { margin-bottom:14px; }
.field label { display:block; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.field input, .field textarea, .field select {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  color:var(--text); padding:9px 12px; border-radius:8px;
  font-family:'DM Mono',monospace; font-size:13px; outline:none; transition:border-color 0.2s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color:var(--accent); }
.field textarea { resize:vertical; min-height:70px; }
.friends-editor { margin-top:14px; }
.friend-row {
  display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:8px;
  align-items:end; margin-bottom:8px;
}
.friend-row input { padding:8px 10px; font-size:12px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }

/* ── LOGIN ── */
#loginModal .modal { max-width:340px; text-align:center; }
#loginModal .modal h2 { margin-bottom:6px; }
#loginModal .subtitle { color:var(--muted); font-size:12px; margin-bottom:22px; }
.login-err { color:#ff8080; font-size:12px; margin-top:8px; display:none; }

/* ── TRACK PAGE ── */
#trackPage {
  display:none; position:fixed; inset:0; background:var(--bg);
  z-index:100; overflow-y:auto; padding:40px 20px;
}
.track-inner { max-width:600px; margin:0 auto; }
.track-back { color:var(--muted); font-size:12px; cursor:pointer; margin-bottom:28px; display:inline-flex; align-items:center; gap:6px; }
.track-back:hover { color:var(--accent); }
.track-name { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:300; margin-bottom:6px; }
.track-code { color:var(--muted); font-size:12px; margin-bottom:28px; }
.big-circle { display:flex; justify-content:center; margin:28px 0; }
.big-circle-wrap { position:relative; width:160px; height:160px; }
.big-circle-wrap svg { transform:rotate(-90deg); }
.big-circle-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.big-circle-pct { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:500; color:var(--accent); }
.big-circle-sub { font-size:11px; color:var(--muted); }
.track-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:22px; }
.track-stat { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
.track-stat .val { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--heart); }
.track-stat .lbl { font-size:11px; color:var(--muted); margin-top:4px; }
.track-note-box { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px; font-size:12px; line-height:1.7; color:var(--text); min-height:50px; }

/* ── BOARD (public) ── */
#boardPage {
  display:none; position:fixed; inset:0; background:var(--bg);
  z-index:100; overflow-y:auto; padding:40px 20px;
}
.board-inner { max-width:800px; margin:0 auto; }
.board-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:32px; }
.board-stat { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
.board-stat .bs-val { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:500; color:var(--accent); }
.board-stat .bs-lbl { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.09em; margin-top:6px; }
.board-client-row {
  background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 20px;
  display:flex; align-items:center; gap:16px; margin-bottom:10px;
}
.board-client-nick { font-family:'Cormorant Garamond',serif; font-size:17px; flex:1; }
.board-client-hearts { color:var(--heart); font-size:12px; }

/* ── HISTORY TRACK (public view) ── */
.pub-history { margin-top:22px; }
.pub-history-title { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:10px; }
.pub-hist-entry {
  display:flex; align-items:center; gap:10px; padding:9px 0;
  border-bottom:1px solid var(--border);
}
.pub-hist-entry:last-child { border-bottom:none; }
.pub-hist-amount { color:var(--heart); font-weight:500; min-width:50px; }
.pub-hist-note { color:var(--muted); font-size:11px; font-style:italic; flex:1; }
.pub-hist-date { color:var(--muted); font-size:10px; }

/* ── MISC ── */
.empty { text-align:center; padding:50px 20px; color:var(--muted); }
.empty .icon { font-size:38px; margin-bottom:14px; opacity:0.4; }
.heart-anim { display:inline-block; animation:pulse 1.6s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.fade-in { animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.admin-badge {
  background:linear-gradient(135deg,rgba(160,120,255,0.15),rgba(224,106,255,0.15));
  border:1px solid rgba(160,120,255,0.3); color:var(--accent);
  padding:4px 12px; border-radius:20px; font-size:11px; letter-spacing:0.06em;
}
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
footer {
  text-align:center; padding-top:36px; border-top:1px solid var(--border);
  margin-top:50px; display:flex; flex-direction:column; align-items:center; gap:14px;
}
.social-links { display:flex; gap:14px; }
.social-link {
  display:inline-flex; align-items:center; gap:7px; color:var(--muted);
  text-decoration:none; font-size:12px; padding:7px 16px;
  border:1px solid var(--border); border-radius:24px; transition:all 0.2s;
}
.social-link:hover { color:var(--accent); border-color:rgba(160,120,255,0.4); }
.footer-copy { color:var(--muted); font-size:11px; }
</style>
</head>
<body>

<!-- ══ LOGIN MODAL ══ -->
<div class="modal-overlay open" id="loginModal">
  <div class="modal">
    <h2>🔐 Вход в панель</h2>
    <p class="subtitle">АКИ | Sky Hearts Tracker</p>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="loginInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="loginErr">Неверный пароль</div>
    <div style="margin-top:14px">
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Войти</button>
    </div>
    <hr style="margin:18px 0;border:none;border-top:1px solid var(--border)">
    <p style="color:var(--muted);font-size:11px">Или просмотр заказа по публичной ссылке — без пароля</p>
    <div style="margin-top:10px">
      <button class="btn btn-ghost btn-sm" style="width:100%" onclick="showBoard()">📊 Публичный борд</button>
    </div>
  </div>
</div>

<!-- ══ ADD/EDIT ORDER MODAL ══ -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <h2 id="orderModalTitle">Новый заказ</h2>
    <div class="field"><label>Ник клиента</label><input id="f_nick" placeholder="SkyUser"></div>
    <div class="field"><label>Дедлайн</label><input id="f_deadline" type="date"></div>
    <div class="field"><label>Способ оплаты</label><input id="f_payment" placeholder="Crypto / Card / etc"></div>
    <div class="field">
      <label>Через гаранта</label>
      <select id="f_guarantor"><option value="false">Нет</option><option value="true">Да</option></select>
    </div>
    <div class="field"><label>Заметки к заказу</label><textarea id="f_notes" placeholder="Любые детали..."></textarea></div>
    <div class="friends-editor">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)">Получатели</span>
        <button class="btn btn-sm" onclick="addFriendRow()">+ Добавить</button>
      </div>
      <div id="friendRows"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeOrderModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveOrder()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ══ TRACKING PAGE (public) ══ -->
<div id="trackPage">
  <div class="track-inner">
    <div class="track-back" onclick="closeTrackPage()">← Назад</div>
    <div id="trackContent"></div>
  </div>
</div>

<!-- ══ BOARD PAGE (public) ══ -->
<div id="boardPage">
  <div class="board-inner">
    <div class="track-back" onclick="closeBoardPage()">← Назад</div>
    <div id="boardContent"></div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div class="app" id="mainApp" style="display:none">
  <header>
    <div class="logo">𓂃 <span>АКИ</span> · Sky Hearts</div>
    <div class="header-right">
      <span class="admin-badge">admin</span>
      <button class="btn btn-sm" onclick="showBoard()">📊 Борд</button>
      <button class="btn btn-primary btn-sm" onclick="openAddOrder()">+ Новый заказ</button>
      <button class="btn btn-sm btn-danger" onclick="doLogout()">Выйти</button>
    </div>
  </header>

  <div class="info-grid" id="statsGrid"></div>

  <div class="section-title">Заказы</div>
  <div class="toolbar">
    <div class="search-wrap">
      <input id="searchInput" placeholder="Поиск по нику, коду, заметкам..." oninput="renderOrders()">
    </div>
    <select id="sortSelect" onchange="renderOrders()">
      <option value="newest">Новые сначала</option>
      <option value="oldest">Старые сначала</option>
      <option value="hearts_desc">Сердца ↓</option>
      <option value="hearts_asc">Сердца ↑</option>
      <option value="progress_desc">Прогресс ↓</option>
      <option value="progress_asc">Прогресс ↑</option>
    </select>
    <select id="filterSelect" onchange="renderOrders()">
      <option value="all">Все</option>
      <option value="active">Активные</option>
      <option value="done">Выполненные</option>
      <option value="overdue">Просроченные</option>
    </select>
  </div>

  <div class="orders-grid" id="ordersGrid"></div>

  <footer>
    <div class="social-links">
      <a class="social-link" id="tgLink" href="#" target="_blank">✈ Telegram</a>
      <a class="social-link" id="dcLink" href="#" target="_blank">◈ Discord</a>
    </div>
    <div class="footer-copy">𓂃 АКИ · Sky Children of the Light</div>
  </footer>
</div>

<script>
// ════════════════════════════════════════════
// CONFIG — Change password here (or move to .env → serve via /api/config)
// ════════════════════════════════════════════
const ADMIN_PASSWORD = 'aki2024'; // ← Change this
const TELEGRAM_LINK  = 'https://t.me/your_telegram';
const DISCORD_LINK   = 'https://discord.gg/your_discord';
const API = ''; // empty = same origin (Express serves this file)

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let isAdmin = false;
let orders  = [];
let editingOrderId = null;
const openCards = new Set();

// ════════════════════════════════════════════
// API HELPERS
// ════════════════════════════════════════════
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

async function loadOrders() {
  try {
    orders = await apiFetch('/api/orders');
  } catch (e) {
    console.error('Failed to load orders:', e);
    orders = [];
  }
}

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
function doLogin() {
  const pwd = document.getElementById('loginInput').value;
  if (pwd === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('loginModal').classList.remove('open');
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('tgLink').href = TELEGRAM_LINK;
    document.getElementById('dcLink').href = DISCORD_LINK;
    loadOrders().then(() => { updateStats(); renderOrders(); });
  } else {
    const err = document.getElementById('loginErr');
    err.style.display = 'block';
    setTimeout(() => { err.style.display = 'none'; }, 2000);
  }
}

function doLogout() {
  isAdmin = false;
  orders = [];
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginModal').classList.add('open');
  document.getElementById('loginInput').value = '';
}

// ════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════
function calcPct(order) {
  let gifted = 0, target = 0;
  (order.friends || []).forEach(f => { gifted += f.hearts_gifted; target += f.hearts_target; });
  return target > 0 ? Math.round(gifted / target * 100) : 0;
}
function totalHearts(order)  { return (order.friends||[]).reduce((s,f) => s + f.hearts_target, 0); }
function totalGifted(order)  { return (order.friends||[]).reduce((s,f) => s + f.hearts_gifted, 0); }
function isDone(order)       { return totalHearts(order) > 0 && totalGifted(order) >= totalHearts(order); }
function isOverdue(order) {
  if (!order.deadline) return false;
  return new Date(order.deadline) < new Date() && !isDone(order);
}

function updateStats() {
  const total   = orders.length;
  const done    = orders.filter(isDone).length;
  const active  = orders.filter(o => !isDone(o) && !isOverdue(o)).length;
  const hearts  = orders.reduce((s, o) => s + totalGifted(o), 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="info-card">
      <div class="label">Всего заказов</div>
      <div class="value">${total}</div>
      <div class="sub">${done} выполнено · ${active} активных</div>
    </div>
    <div class="info-card">
      <div class="label">Сердец подарено</div>
      <div class="value">${hearts}</div>
      <div class="sub">из ${orders.reduce((s,o)=>s+totalHearts(o),0)}</div>
    </div>
    <div class="info-card">
      <div class="label">Выполнено</div>
      <div class="value">${done}</div>
      <div class="sub">${Math.round(done/Math.max(total,1)*100)}% завершённость</div>
    </div>
    <div class="info-card">
      <div class="label">Просрочено</div>
      <div class="value">${orders.filter(isOverdue).length}</div>
      <div class="sub">требует внимания</div>
    </div>`;
}

// ════════════════════════════════════════════
// RENDER ORDERS
// ════════════════════════════════════════════
function renderOrders() {
  const query  = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort   = document.getElementById('sortSelect').value;
  const filter = document.getElementById('filterSelect').value;
  const grid   = document.getElementById('ordersGrid');

  let list = [...orders];

  if (filter === 'active')  list = list.filter(o => !isDone(o) && !isOverdue(o));
  if (filter === 'done')    list = list.filter(isDone);
  if (filter === 'overdue') list = list.filter(isOverdue);

  if (query) {
    list = list.filter(o =>
      o.client_name.toLowerCase().includes(query) ||
      (o.code_phrase||'').toLowerCase().includes(query) ||
      (o.notes||'').toLowerCase().includes(query) ||
      (o.friends||[]).some(f => f.nick.toLowerCase().includes(query))
    );
  }

  list.sort((a,b) => {
    if (sort==='newest')       return new Date(b.created_at)-new Date(a.created_at);
    if (sort==='oldest')       return new Date(a.created_at)-new Date(b.created_at);
    if (sort==='hearts_desc')  return totalHearts(b)-totalHearts(a);
    if (sort==='hearts_asc')   return totalHearts(a)-totalHearts(b);
    if (sort==='progress_desc')return calcPct(b)-calcPct(a);
    if (sort==='progress_asc') return calcPct(a)-calcPct(b);
    return 0;
  });

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>Заказов не найдено</div></div>`;
    return;
  }
  grid.innerHTML = list.map(o => orderCardHTML(o)).join('');
  openCards.forEach(id => {
    const card = document.querySelector(`.order-card[data-id="${id}"]`);
    if (card) { card.classList.add('expanded'); card.querySelector('.order-body').classList.add('open'); }
  });
}

function circleHTML(pct, size=52, stroke=4) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  const color = pct >= 100 ? '#60e0a0' : pct >= 50 ? '#a078ff' : '#e06aff';
  return `<div class="circle-prog" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="circle-bg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"/>
      <circle class="circle-fill" cx="${size/2}" cy="${size/2}" r="${r}"
        stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
    </svg>
    <div class="circle-text">${pct}%</div>
  </div>`;
}

function orderCardHTML(o) {
  const pct  = calcPct(o);
  const gt   = totalGifted(o);
  const ht   = totalHearts(o);
  const daysLeft = o.deadline ? Math.ceil((new Date(o.deadline) - new Date()) / 86400000) : null;
  const dTag = daysLeft === null ? '' : daysLeft > 0
    ? `<span class="tag tag-gold">${daysLeft}д осталось</span>`
    : `<span class="tag tag-heart">просрочен</span>`;
  const gTag = o.with_guarantor ? `<span class="tag tag-green">гарант</span>` : '';

  const friendsHTML = (o.friends||[]).map(f => {
    const fp = f.hearts_target > 0 ? Math.round(f.hearts_gifted / f.hearts_target * 100) : 0;
    const trackUrl = `${location.origin}${location.pathname}#track-${o.id}-${f.id}`;
    return `<div class="friend-card">
      <div>
        <div class="friend-nick">${f.nick}</div>
        <div class="friend-hearts">❤️ ${f.hearts_gifted} / ${f.hearts_target}</div>
        <div style="margin-top:8px;display:flex;gap:7px;flex-wrap:wrap;align-items:center">
          <a class="track-link" href="${trackUrl}" onclick="openTrack('${o.id}','${f.id}');return false;">🔗 Ссылка</a>
        </div>
        <div class="friend-notes">
          <textarea class="friend-note-text" placeholder="Заметка..." oninput="saveFriendNote('${o.id}','${f.id}',this.value)">${f.notes||''}</textarea>
        </div>
        <div class="history-panel">
          <div class="history-panel-title">История передач</div>
          <div class="history-list" id="hl-${f.id}"><div style="color:var(--muted);font-size:11px">Загрузка...</div></div>
          <div class="history-add">
            <input type="number" min="1" placeholder="❤️ кол-во" id="ha-amount-${f.id}">
            <input type="text" placeholder="Заметка (опц.)" id="ha-note-${f.id}">
            <button class="btn btn-sm btn-primary" onclick="addHistory('${o.id}','${f.id}')">+ Записать</button>
          </div>
        </div>
      </div>
      <div class="friend-progress">
        ${circleHTML(fp, 48, 4)}
      </div>
    </div>`;
  }).join('');

  return `<div class="order-card fade-in" data-id="${o.id}">
    <div class="order-header" onclick="toggleCard('${o.id}')">
      <div class="order-header-left">
        ${circleHTML(pct)}
        <div>
          <div class="order-nick">${o.client_name}</div>
          <div class="order-code">${o.code_phrase||''} · ${(o.created_at||'').split('T')[0]}</div>
        </div>
      </div>
      <div class="order-meta">
        <span class="tag tag-heart">❤️ ${gt}/${ht}</span>
        ${dTag}${gTag}
        <span class="chevron">⌄</span>
      </div>
    </div>
    <div class="order-body" id="body-${o.id}">
      <div class="notes-block">
        <div class="notes-label">Заметки <span class="notes-saved" id="ns-${o.id}">✓ сохранено</span></div>
        <textarea class="notes-text" placeholder="Детали заказа..." oninput="saveNotes('${o.id}',this.value)">${o.notes||''}</textarea>
      </div>
      <div class="friends-title">Получатели (${(o.friends||[]).length})</div>
      <div class="friends-list">${friendsHTML}</div>
      <div class="order-actions">
        <button class="btn btn-sm" onclick="editOrder('${o.id}')">✏ Редактировать</button>
        <button class="btn btn-sm btn-danger" onclick="deleteOrder('${o.id}')">✕ Удалить</button>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════
// TOGGLE CARD — lazy load history on open
// ════════════════════════════════════════════
function toggleCard(id) {
  const card = document.querySelector(`.order-card[data-id="${id}"]`);
  const body = document.getElementById(`body-${id}`);
  if (!card) return;
  const wasOpen = openCards.has(id);
  if (wasOpen) {
    openCards.delete(id);
    card.classList.remove('expanded');
    body.classList.remove('open');
  } else {
    openCards.add(id);
    card.classList.add('expanded');
    body.classList.add('open');
    // Lazy-load history for each friend
    const order = orders.find(o => o.id === id);
    if (order) {
      (order.friends||[]).forEach(f => loadFriendHistory(f.id));
    }
  }
}

// ════════════════════════════════════════════
// HISTORY
// ════════════════════════════════════════════
async function loadFriendHistory(friendId) {
  const el = document.getElementById(`hl-${friendId}`);
  if (!el) return;
  try {
    const entries = await apiFetch(`/api/history/${friendId}`);
    renderHistoryList(friendId, entries);
  } catch (e) {
    if (el) el.innerHTML = `<div style="color:var(--muted);font-size:11px">Ошибка загрузки</div>`;
  }
}

function renderHistoryList(friendId, entries) {
  const el = document.getElementById(`hl-${friendId}`);
  if (!el) return;
  if (!entries.length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:11px;padding:4px 0">Передач пока нет</div>`;
    return;
  }
  el.innerHTML = entries.map(e => `
    <div class="history-entry">
      <div class="history-entry-left">
        <span class="history-entry-amount">+${e.amount} ❤️</span>
        ${e.note ? `<span class="history-entry-note">${e.note}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="history-entry-date">${formatDT(e.created_at)}</span>
        <button class="btn btn-xs btn-danger" onclick="deleteHistory('${e.id}','${friendId}')">✕</button>
      </div>
    </div>`).join('');
}

async function addHistory(orderId, friendId) {
  const amountEl = document.getElementById(`ha-amount-${friendId}`);
  const noteEl   = document.getElementById(`ha-note-${friendId}`);
  const amount   = parseInt(amountEl.value);
  const note     = noteEl.value.trim();
  if (!amount || amount <= 0) return;

  try {
    const { newGifted } = await apiFetch('/api/history', {
      method: 'POST',
      body: JSON.stringify({ friendId, amount, note }),
    });
    amountEl.value = '';
    noteEl.value   = '';

    // Update local state
    const order = orders.find(o => o.id === orderId);
    if (order) {
      const friend = (order.friends||[]).find(f => f.id === friendId);
      if (friend) friend.hearts_gifted = newGifted;
    }
    updateStats();
    renderOrders();
    // Reopen card and reload history
    openCards.add(orderId);
    setTimeout(() => {
      const card = document.querySelector(`.order-card[data-id="${orderId}"]`);
      const body = document.getElementById(`body-${orderId}`);
      if (card && body) { card.classList.add('expanded'); body.classList.add('open'); }
      loadFriendHistory(friendId);
    }, 50);
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

async function deleteHistory(entryId, friendId) {
  if (!confirm('Удалить запись и откатить сердечки?')) return;
  try {
    const { rollback } = await apiFetch(`/api/history/${entryId}`, { method: 'DELETE' });
    // Update local state
    orders.forEach(o => {
      (o.friends||[]).forEach(f => { if (f.id === friendId) f.hearts_gifted = rollback; });
    });
    updateStats();
    renderOrders();
    openCards.forEach(id => {
      setTimeout(() => {
        const card = document.querySelector(`.order-card[data-id="${id}"]`);
        const body = document.getElementById(`body-${id}`);
        if (card && body) { card.classList.add('expanded'); body.classList.add('open'); }
        loadFriendHistory(friendId);
      }, 50);
    });
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

// ════════════════════════════════════════════
// NOTES AUTOSAVE
// ════════════════════════════════════════════
const notesTimers = {};
function saveNotes(orderId, val) {
  clearTimeout(notesTimers[orderId]);
  notesTimers[orderId] = setTimeout(async () => {
    try {
      await apiFetch(`/api/orders/${orderId}/notes`, { method:'PATCH', body: JSON.stringify({ notes: val }) });
      const el = document.getElementById(`ns-${orderId}`);
      if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500); }
    } catch(e) {}
  }, 600);
}

const friendNoteTimers = {};
function saveFriendNote(orderId, friendId, val) {
  clearTimeout(friendNoteTimers[friendId]);
  friendNoteTimers[friendId] = setTimeout(async () => {
    try {
      await apiFetch(`/api/orders/${orderId}/friends/${friendId}`, { method:'PATCH', body: JSON.stringify({ notes: val }) });
    } catch(e) {}
  }, 600);
}

// ════════════════════════════════════════════
// ORDER MODAL
// ════════════════════════════════════════════
function openAddOrder() {
  editingOrderId = null;
  document.getElementById('orderModalTitle').textContent = 'Новый заказ';
  document.getElementById('f_nick').value = '';
  document.getElementById('f_deadline').value = '';
  document.getElementById('f_payment').value = '';
  document.getElementById('f_guarantor').value = 'false';
  document.getElementById('f_notes').value = '';
  document.getElementById('friendRows').innerHTML = '';
  addFriendRow();
  document.getElementById('orderModal').classList.add('open');
}

function editOrder(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  editingOrderId = id;
  document.getElementById('orderModalTitle').textContent = 'Редактировать заказ';
  document.getElementById('f_nick').value = o.client_name;
  document.getElementById('f_deadline').value = o.deadline || '';
  document.getElementById('f_payment').value = o.payment_method || '';
  document.getElementById('f_guarantor').value = o.with_guarantor ? 'true' : 'false';
  document.getElementById('f_notes').value = o.notes || '';
  const rows = document.getElementById('friendRows');
  rows.innerHTML = '';
  (o.friends||[]).forEach(f => addFriendRow(f.nick, f.hearts_target, f.hearts_gifted));
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal() { document.getElementById('orderModal').classList.remove('open'); }

function addFriendRow(nick='', target='', gifted='') {
  const rows = document.getElementById('friendRows');
  const div  = document.createElement('div');
  div.className = 'friend-row';
  div.innerHTML = `
    <div class="field" style="margin:0"><label>Ник</label><input placeholder="SkyUser" value="${nick}"></div>
    <div class="field" style="margin:0"><label>Цель ❤️</label><input type="number" placeholder="225" value="${target}"></div>
    <div class="field" style="margin:0"><label>Подарено</label><input type="number" placeholder="0" value="${gifted}"></div>
    <button class="btn btn-sm btn-danger" style="margin-top:20px;align-self:end" onclick="this.parentElement.remove()">✕</button>`;
  rows.appendChild(div);
}

async function saveOrder() {
  const nick       = document.getElementById('f_nick').value.trim();
  const deadline   = document.getElementById('f_deadline').value;
  const payment    = document.getElementById('f_payment').value.trim();
  const guarantor  = document.getElementById('f_guarantor').value === 'true';
  const notes      = document.getElementById('f_notes').value;
  if (!nick) { alert('Укажи ник клиента'); return; }

  const rows    = document.getElementById('friendRows').querySelectorAll('.friend-row');
  const friends = [];
  rows.forEach((row, i) => {
    const inputs = row.querySelectorAll('input');
    friends.push({
      nick:         inputs[0].value.trim() || nick,
      heartsTarget: parseInt(inputs[1].value) || 0,
      heartsGifted: parseInt(inputs[2].value) || 0,
    });
  });
  if (!friends.length) { alert('Добавь хотя бы одного получателя'); return; }

  const clientNum  = String(orders.length + 1).padStart(3,'0');
  const initials   = nick.slice(0,2).toUpperCase();
  const codePhrase = editingOrderId ? undefined : `AKI-${clientNum}-${initials}`;

  try {
    if (editingOrderId) {
      const updated = await apiFetch(`/api/orders/${editingOrderId}`, {
        method: 'PUT',
        body: JSON.stringify({ clientName: nick, deadline, paymentMethod: payment, withGuarantor: guarantor, notes, friends }),
      });
      const idx = orders.findIndex(x => x.id === editingOrderId);
      if (idx !== -1) orders[idx] = updated;
    } else {
      const created = await apiFetch('/api/orders', {
        method: 'POST',
        body: JSON.stringify({ clientName: nick, codePhrase, deadline, paymentMethod: payment, withGuarantor: guarantor, notes, friends }),
      });
      orders.unshift(created);
    }
    closeOrderModal();
    updateStats();
    renderOrders();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

async function deleteOrder(id) {
  if (!confirm('Удалить этот заказ?')) return;
  try {
    await apiFetch(`/api/orders/${id}`, { method: 'DELETE' });
    orders = orders.filter(x => x.id !== id);
    openCards.delete(id);
    updateStats();
    renderOrders();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

// ════════════════════════════════════════════
// TRACKING PAGE (public link)
// ════════════════════════════════════════════
async function openTrack(orderId, friendId) {
  location.hash = `track-${orderId}-${friendId}`;
  await showTrackPage(orderId, friendId);
}

async function showTrackPage(orderId, friendId) {
  // Try from loaded orders first; else fetch from API
  let o = orders.find(x => x.id === orderId);
  if (!o) {
    try { o = await apiFetch(`/api/orders/${orderId}`); } catch(e) { return; }
  }
  const f = (o.friends||[]).find(x => x.id === friendId);
  if (!f) return;

  const pct  = f.hearts_target > 0 ? Math.round(f.hearts_gifted / f.hearts_target * 100) : 0;
  const r = 64, stroke = 8, circ = 2 * Math.PI * r, offset = circ * (1 - pct / 100);
  const color = pct >= 100 ? '#60e0a0' : pct >= 50 ? '#a078ff' : '#e06aff';
  const size  = 160;
  const daysLeft = o.deadline ? Math.ceil((new Date(o.deadline) - new Date()) / 86400000) : null;

  // Load history for public view
  let historyHTML = '';
  try {
    const history = await apiFetch(`/api/history/${friendId}`);
    if (history.length) {
      historyHTML = `<div class="pub-history">
        <div class="pub-history-title">История передач</div>
        ${history.map(e => `
          <div class="pub-hist-entry">
            <span class="pub-hist-amount">+${e.amount} ❤️</span>
            ${e.note ? `<span class="pub-hist-note">${e.note}</span>` : '<span class="pub-hist-note"></span>'}
            <span class="pub-hist-date">${formatDT(e.created_at)}</span>
          </div>`).join('')}
      </div>`;
    }
  } catch(e) {}

  document.getElementById('trackContent').innerHTML = `
    <div class="track-name">${f.nick}</div>
    <div class="track-code">Заказ: ${o.code_phrase||''} · ${o.client_name}</div>
    <div class="big-circle">
      <div class="big-circle-wrap">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          <circle fill="none" stroke="rgba(160,120,255,0.1)" stroke-width="${stroke}" cx="${size/2}" cy="${size/2}" r="${r}"/>
          <circle fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
            cx="${size/2}" cy="${size/2}" r="${r}"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
            style="transform:rotate(-90deg);transform-origin:center"/>
        </svg>
        <div class="big-circle-text">
          <div class="big-circle-pct">${pct}%</div>
          <div class="big-circle-sub">выполнено</div>
        </div>
      </div>
    </div>
    <div class="track-stats">
      <div class="track-stat"><div class="val">${f.hearts_gifted}</div><div class="lbl">❤️ Подарено</div></div>
      <div class="track-stat"><div class="val">${f.hearts_target}</div><div class="lbl">🎯 Цель</div></div>
      <div class="track-stat"><div class="val">${f.hearts_target - f.hearts_gifted}</div><div class="lbl">⏳ Осталось</div></div>
      <div class="track-stat"><div class="val">${daysLeft === null ? '—' : daysLeft > 0 ? daysLeft+'д' : 'просрочен'}</div><div class="lbl">📅 Дедлайн</div></div>
    </div>
    ${f.notes ? `<div style="margin-bottom:10px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.08em">Заметки</div>
    <div class="track-note-box">${f.notes}</div>` : ''}
    ${historyHTML}
    <div style="margin-top:22px;text-align:center;color:var(--muted);font-size:11px">
      𓂃 АКИ · Sky Children of the Light<br>
      <a href="${TELEGRAM_LINK}" target="_blank" style="color:var(--accent);text-decoration:none">Telegram</a>
      &nbsp;·&nbsp;
      <a href="${DISCORD_LINK}" target="_blank" style="color:var(--accent);text-decoration:none">Discord</a>
    </div>`;

  document.getElementById('trackPage').style.display = 'block';
  document.getElementById('mainApp').style.display   = 'none';
  document.getElementById('boardPage').style.display = 'none';
  document.getElementById('loginModal').classList.remove('open');
}

function closeTrackPage() {
  location.hash = '';
  document.getElementById('trackPage').style.display = 'none';
  if (isAdmin) document.getElementById('mainApp').style.display = 'block';
  else         document.getElementById('loginModal').classList.add('open');
}

// ════════════════════════════════════════════
// PUBLIC BOARD
// ════════════════════════════════════════════
async function showBoard() {
  let list = orders;
  if (!list.length) {
    try { list = await apiFetch('/api/orders'); } catch(e) { list = []; }
  }

  const totalOrdered = list.reduce((s,o) => s + totalHearts(o), 0);
  const totalGiftedAll = list.reduce((s,o) => s + totalGifted(o), 0);
  const totalDone    = list.filter(isDone).length;

  document.getElementById('boardContent').innerHTML = `
    <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:0.06em;margin-bottom:24px;">
      ✦ Инфо о заказах
    </div>
    <div class="board-stats">
      <div class="board-stat"><div class="bs-val">${totalOrdered}</div><div class="bs-lbl">📦 Всего заказано</div></div>
      <div class="board-stat"><div class="bs-val">${totalGiftedAll}</div><div class="bs-lbl">✓ Уже отдано</div></div>
      <div class="board-stat"><div class="bs-val">${list.length}</div><div class="bs-lbl">👤 Заказчиков</div></div>
      <div class="board-stat"><div class="bs-val">${totalDone}</div><div class="bs-lbl">✦ Выполнено</div></div>
    </div>
    <div class="section-title">Заказы</div>
    ${list.length ? list.map(o => {
      const pct = calcPct(o);
      const gt  = totalGifted(o);
      const ht  = totalHearts(o);
      return `<div class="board-client-row">
        ${circleHTML(pct, 44, 4)}
        <div style="flex:1">
          <div class="board-client-nick">${o.client_name}</div>
          <div class="board-client-hearts">❤️ ${gt} / ${ht}</div>
        </div>
        <span class="tag ${isDone(o)?'tag-green':'tag-heart'}">${pct}%</span>
      </div>`;
    }).join('') : `<div class="empty"><div class="icon">🌿</div>Заказов пока нет</div>`}
    <div style="margin-top:24px;text-align:center;color:var(--muted);font-size:11px">
      Данные обновляются при открытии страницы<br>
      𓂃 АКИ · Sky Children of the Light
    </div>`;

  document.getElementById('boardPage').style.display  = 'block';
  document.getElementById('mainApp').style.display    = 'none';
  document.getElementById('trackPage').style.display  = 'none';
  document.getElementById('loginModal').classList.remove('open');
  location.hash = 'board';
}

function closeBoardPage() {
  location.hash = '';
  document.getElementById('boardPage').style.display = 'none';
  if (isAdmin) document.getElementById('mainApp').style.display = 'block';
  else         document.getElementById('loginModal').classList.add('open');
}

// ════════════════════════════════════════════
// HASH ROUTING
// ════════════════════════════════════════════
async function checkHash() {
  const hash = location.hash;
  if (!hash) return;
  if (hash === '#board') { await showBoard(); return; }
  if (hash.startsWith('#track-')) {
    const rest = hash.slice(7); // orderId-friendId
    // orderId = "order-..." (could contain dashes), friendId = "uuid"
    // Since we use UUIDs from Supabase, split on first chunk
    // Format: #track-{orderId}-{friendId} where both are UUIDs
    const parts = rest.split('-');
    // UUIDs are 36 chars. Try to find a valid pair from loaded or fetched data
    try {
      const allOrders = orders.length ? orders : await apiFetch('/api/orders');
      for (const o of allOrders) {
        for (const f of (o.friends||[])) {
          if (`${o.id}-${f.id}` === rest) {
            await showTrackPage(o.id, f.id);
            return;
          }
        }
      }
    } catch(e) {}
  }
}

window.addEventListener('hashchange', () => checkHash());
window.addEventListener('DOMContentLoaded', () => checkHash());

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function formatDT(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit' })
    + ' ' + d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
}
